<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGM Healthcare Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --green: #3fb950; --red: #f85149; --border: #30363d; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 30px; margin: 0; }
        
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        h1 { font-size: 20px; font-weight: 600; color: var(--accent); margin: 0; }
        
        .toolbar { display: flex; gap: 20px; background: var(--card); padding: 12px 20px; border-radius: 10px; border: 1px solid var(--border); }
        .filter-group { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
        
        select { 
            background: #0d1117; color: white; border: 1px solid var(--border); 
            padding: 10px 15px; border-radius: 8px; font-size: 15px; cursor: pointer; 
            min-width: 140px; transition: border 0.3s;
        }
        select:hover { border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 15px; text-align: center; transition: transform 0.2s;
        }
        .card:hover { border-color: #444; transform: translateY(-2px); }
        .card h2 { margin: 0; font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        .card .value { font-size: 28px; font-weight: 700; margin: 5px 0; color: var(--accent); }
        
        .chart-container { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 25px; height: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="header-flex">
        <h1>📟 ANALYSES GLYCÉMIE PRÉCISION</h1>
        <div class="toolbar">
            <div class="filter-group">Année <select id="yearSelect" onchange="updateView()"></select></div>
            <div class="filter-group">Mois <select id="monthSelect" onchange="updateView()"></select></div>
        </div>
    </div>

    <div class="grid">
        <div class="card"><h2>Moyenne</h2><div class="value" id="avg">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Pic Maximum</h2><div class="value" id="max" style="color:var(--red)">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Temps dans la cible</h2><div class="value" id="tir" style="color:var(--green)">-</div><small>%</small></div>
    </div>

    <div class="chart-container"><canvas id="cgmChart"></canvas></div>

    <script>
        let rawData = [];
        let chartInstance = null;

        async function init() {
            const r = await fetch('data.json');
            const d = await r.json();
            rawData = d.points.map(p => ({ t: new Date(p.t), v: p.v }));
            const years = [...new Set(rawData.map(p => p.t.getFullYear()))].sort((a,b) => b-a);
            document.getElementById('yearSelect').innerHTML = '<option value="all">Historique</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
            const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
            document.getElementById('monthSelect').innerHTML = '<option value="all">Année complète</option>' + months.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            updateView();
        }

        function updateView() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            let filtered = rawData;
            if(year !== 'all') filtered = filtered.filter(p => p.t.getFullYear() == year);
            if(month !== 'all') filtered = filtered.filter(p => p.t.getMonth() == month);
            
            // Toujours détruire l'ancien graphe avant de redessiner
            if(chartInstance) { chartInstance.destroy(); chartInstance = null; }

            if(filtered.length === 0) {
                // Vider les KPIs
                document.getElementById('avg').innerText = '-';
                document.getElementById('max').innerText = '-';
                document.getElementById('tir').innerText = '-';
                // Afficher un message "Aucune donnée" sur le canvas
                const ctx = document.getElementById('cgmChart').getContext('2d');
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                ctx.fillStyle = '#8b949e';
                ctx.font = '16px system-ui';
                ctx.textAlign = 'center';
                ctx.fillText('Aucune donnée pour cette période', ctx.canvas.width / 2, ctx.canvas.height / 2);
                return;
            }

            const vals = filtered.map(p => p.v);
            document.getElementById('avg').innerText = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
            document.getElementById('max').innerText = Math.max(...vals);
            document.getElementById('tir').innerText = ((vals.filter(v=>v>=70&&v<=180).length/vals.length)*100).toFixed(1);

            const ctx = document.getElementById('cgmChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Glucose (mg/dL)',
                        data: filtered.map(p => ({ x: p.t, y: p.v })),
                        borderColor: '#58a6ff', borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0, backgroundColor: 'rgba(88,166,255,0.03)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { display: false }, ticks: { color: '#8b949e' } },
                        y: { min: 40, max: 450, grid: { color: '#222' }, ticks: { color: '#8b949e' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        init();
    </script>
</body>
</html>
