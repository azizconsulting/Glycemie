<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGM Interactive Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --green: #238636; --red: #da3633; --border: #30363d; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .toolbar { display: flex; gap: 15px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        select { background: #0d1117; color: white; border: 1px solid var(--border); padding: 8px; border-radius: 6px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
        .card .value { font-size: 32px; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .chart-container { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; height: 500px; }
        h1 { font-size: 22px; color: var(--accent); margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📟 Dashboard Glycémie Interactif</h1>
    
    <div class="toolbar">
        <div>Année: <select id="yearSelect" onchange="updateView()"></select></div>
        <div>Mois: <select id="monthSelect" onchange="updateView()"></select></div>
    </div>

    <div class="grid">
        <div class="card"><h2>Moyenne</h2><div class="value" id="avg">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Pic Max</h2><div class="value" id="max" style="color:var(--red)">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Temps Cible (70-180)</h2><div class="value" id="tir" style="color:var(--green)">-</div><small>%</small></div>
    </div>

    <div class="chart-container"><canvas id="cgmChart"></canvas></div>

    <script>
        let rawData = [];
        let chartInstance = null;

        async function init() {
            const r = await fetch('data.json');
            const d = await r.json();
            rawData = d.points.map(p => ({ t: new Date(p.t), v: p.v }));
            
            // Populer les filtres
            const years = [...new Set(rawData.map(p => p.t.getFullYear()))].sort((a,b) => b-a);
            const ySel = document.getElementById('yearSelect');
            ySel.innerHTML = '<option value="all">Toutes</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
            
            const months = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
            document.getElementById('monthSelect').innerHTML = '<option value="all">Tous</option>' + months.map((m, i) => `<option value="${i}">${m}</option>`).join('');
            
            updateView();
        }

        function updateView() {
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            let filtered = rawData;
            if(year !== 'all') filtered = filtered.filter(p => p.t.getFullYear() == year);
            if(month !== 'all') filtered = filtered.filter(p => p.t.getMonth() == month);

            if(filtered.length === 0) return;

            // Stats
            const vals = filtered.map(p => p.v);
            const avg = vals.reduce((a, b) => a + b, 0) / vals.length;
            const max = Math.max(...vals);
            const tir = (vals.filter(v => v >= 70 && v <= 180).length / vals.length) * 100;

            document.getElementById('avg').innerText = avg.toFixed(1);
            document.getElementById('max').innerText = max;
            document.getElementById('tir').innerText = tir.toFixed(1);

            // Chart
            const ctx = document.getElementById('cgmChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [{
                        label: 'Glucose',
                        data: filtered.map(p => ({ x: p.t, y: p.v })),
                        borderColor: '#58a6ff', fill: true, tension: 0.3, pointRadius: 1, backgroundColor: 'rgba(88,166,255,0.05)'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { type: 'time', time: { unit: 'day' }, grid: { color: '#333' } },
                        y: { min: 40, max: 450, grid: { color: '#333' } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
        init();
    </script>
</body>
</html>
