<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGM Analytics - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --green: #238636; --orange: #d29922; --red: #da3633; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; text-align: center; }
        .card h2 { margin: 0; font-size: 14px; color: #8b949e; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: bold; margin: 10px 0; color: var(--accent); }
        .chart-container { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; height: 450px; }
        h1 { font-size: 24px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; color: var(--accent); }
    </style>
</head>
<body>
    <h1>📟 CGM Healthcare Dashboard</h1>
    <div class="grid">
        <div class="card"><h2>Moyenne</h2><div class="value" id="avg">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Pic Max</h2><div class="value" id="max" style="color:var(--red)">-</div><small>mg/dL</small></div>
        <div class="card"><h2>Temps Cible (70-180)</h2><div class="value" id="tir" style="color:var(--green)">-</div><small>%</small></div>
    </div>
    <div class="chart-container"><canvas id="cgmChart"></canvas></div>
    <script>
        async function loadData() {
            try {
                const r = await fetch('data.json');
                const d = await r.json();
                document.getElementById('avg').innerText = d.stats.avg.toFixed(1);
                document.getElementById('max').innerText = d.stats.max;
                document.getElementById('tir').innerText = d.stats.tir.toFixed(1);
                const ctx = document.getElementById('cgmChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        datasets: [{
                            label: 'Glycémie',
                            data: d.points.map(p => ({ x: p.t, y: p.v })),
                            borderColor: '#58a6ff',
                            backgroundColor: 'rgba(88, 166, 255, 0.1)',
                            fill: true, tension: 0.3, pointRadius: 1
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { type: 'time', time: { unit: 'day' }, grid: { color: '#333' } },
                            y: { min: 40, max: 450, grid: { color: '#333' } }
                        },
                        plugins: { legend: { display: false } }
                    }
                });
            } catch (e) { console.error(e); }
        }
        loadData();
    </script>
</body>
</html>
